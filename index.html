<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Danh Bạ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-[#F9FAFB] font-sans text-[17px] leading-7 text-slate-700">

<main class="mx-auto w-full max-w-[1120px] px-4 py-6 sm:px-6 lg:px-8 lg:py-8">

  <section class="mb-8 flex flex-col gap-5 lg:flex-row lg:items-center lg:justify-between">
    <div>
      <h1 class="text-3xl font-bold text-slate-800">Quản Lý Danh Bạ</h1>
      <p class="mt-2 text-base text-slate-500">
        Quản lý và tổ chức danh bạ của bạn một cách dễ dàng
      </p>
    </div>

    <button id="open-create-button"
      class="inline-flex items-center gap-2 rounded-xl bg-[#000000] px-5 py-3 text-base font-medium text-[#FFFFFF] hover:bg-[#111827]">
      ＋ Thêm Danh Bạ
    </button>
  </section>

  <section class="mb-6">
    <input id="search-input" type="search" placeholder="Tìm kiếm theo tên..."
      class="h-14 w-full rounded-xl border px-4 text-lg focus:ring-2 focus:ring-black/10">
  </section>

  <section class="mb-6 space-y-3">

    <div id="loading-banner" class="hidden flex items-center gap-3 rounded-xl bg-[#F3F4F6] px-4 py-3 text-base">
      <span class="h-4 w-4 animate-spin rounded-full border-2 border-[#000000] border-t-black"></span>
      <span>Đang tải...</span>
    </div>

    <div id="success-banner" class="hidden flex items-center justify-between rounded-xl bg-[#DCFCE7] px-4 py-3 text-base">
      <span id="success-message"></span>
      <button id="dismiss-success" class="font-medium">Đóng</button>
    </div>

    <div id="error-banner" class="hidden flex items-center justify-between rounded-xl bg-[#FEE2E2] px-4 py-3 text-base">
      <span id="error-message"></span>
      <button id="retry-button" class="font-medium">Thử lại</button>
    </div>

  </section>

  <section id="directory-grid" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 [&>p]:col-span-full [&>p]:flex [&>p]:min-h-[320px] [&>p]:items-center [&>p]:justify-center [&>p]:rounded-2xl [&>p]:border [&>p]:border-gray-200 [&>p]:bg-white [&>p]:px-6 [&>p]:text-center [&>p]:text-lg [&>p]:text-gray-500 [&>p]:shadow-sm"></section>

</main>

<div id="form-modal"
  class="fixed inset-0 hidden items-center justify-center bg-black/40 z-50">

  <div class="relative w-full max-w-[500px] rounded-2xl bg-[#FFFFFF] p-4 shadow-lg lg:max-w-[500px] lg:p-5">

    <button id="close-modal" class="absolute right-4 top-4 text-2xl leading-none text-slate-600">×</button>

    <h2 id="form-title" class="mb-1.5 text-xl font-bold leading-7">Thêm Danh Bạ Mới</h2>
    <p class="mb-3 text-sm text-[#6B7280]">Nhập thông tin danh bạ mới</p>

    <form id="contact-form" class="space-y-2.5">

      <div>
        <label class="text-sm font-medium">Họ Tên *</label>
        <input id="name" placeholder="Nhập họ tên" class="mt-1.5 w-full rounded-xl border px-3.5 py-2.5 text-sm shadow-[0_1px_2px_rgba(0,0,0,0.04)] focus:outline-none focus:ring-2 focus:ring-black/10" required>
      </div>

      <div>
        <label class="text-sm font-medium">Số Điện Thoại *</label>
        <input id="phone" placeholder="Nhập số điện thoại (vd: +84912345678)" class="mt-1.5 w-full rounded-xl border px-3.5 py-2.5 text-sm shadow-[0_1px_2px_rgba(0,0,0,0.04)] focus:outline-none focus:ring-2 focus:ring-black/10" required>
      </div>

      <div>
        <label class="text-sm font-medium">Email *</label>
        <input id="email" placeholder="Nhập email" class="mt-1.5 w-full rounded-xl border px-3.5 py-2.5 text-sm shadow-[0_1px_2px_rgba(0,0,0,0.04)] focus:outline-none focus:ring-2 focus:ring-black/10" required>
      </div>

      <div>
        <label class="text-sm font-medium">Địa Chỉ</label>
        <textarea id="address" placeholder="Nhập địa chỉ (tùy chọn)" class="mt-1.5 w-full min-h-[64px] rounded-xl border px-3.5 py-2.5 text-sm shadow-[0_1px_2px_rgba(0,0,0,0.04)] focus:outline-none focus:ring-2 focus:ring-black/10"></textarea>
      </div>

      <div class="flex gap-2.5 pt-1.5">
        <button type="button" id="cancel-btn" class="flex-1 rounded-xl border py-2.5 text-sm font-medium shadow-[0_1px_2px_rgba(0,0,0,0.04)]">
          Hủy
        </button>

        <button type="submit" class="flex-1 rounded-xl bg-black py-2.5 text-sm font-medium text-white shadow-[0_1px_2px_rgba(0,0,0,0.04)]">
          Lưu
        </button>
      </div>

    </form>

  </div>
</div>

<div id="delete-modal"
  class="fixed inset-0 hidden items-center justify-center bg-black/40 z-50">

  <div class="w-full max-w-lg rounded-2xl bg-[#FFFFFF] p-8">

    <h2 class="mb-3 text-2xl font-bold">Xác Nhận Xóa</h2>
    <p class="mb-6 text-base text-[#6B7280]">
      Bạn có chắc muốn xóa danh bạ này không? Hành động này không thể hoàn tác.
    </p>

    <div class="flex gap-3">
      <button id="cancel-delete" class="flex-1 rounded-xl border py-3 text-base font-medium">
        Hủy
      </button>

      <button id="confirm-delete" class="flex-1 rounded-xl bg-[#EF4444] py-3 text-base font-medium text-[#FFFFFF] hover:bg-[#DC2626]">
        Xóa
      </button>
    </div>

  </div>
</div>

<script src="./app.js"></script>

</body>
</html>
